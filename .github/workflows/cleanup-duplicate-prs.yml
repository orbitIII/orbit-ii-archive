name: Cleanup duplicate automation PRs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List matches only (no close/delete)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      days:
        description: "Only close bridge automation PRs created within this many days"
        required: false
        default: "5"

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Close recent bridge-synthese duplicate PRs only
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run }}
          DAYS: ${{ inputs.days }}
        run: |
          set -euo pipefail
          CUTOFF_EPOCH=$(date -u -d "${DAYS} days ago" +%s)

          is_recent_bridge_duplicate() {
            local ref="$1" created_at="$2"
            [[ "$ref" == cursor/bridge-synthese-* || "$ref" == cursor/bc-* ]] || return 1
            local created_epoch
            created_epoch=$(date -u -d "$created_at" +%s)
            (( created_epoch >= CUTOFF_EPOCH ))
          }

          mapfile -t rows < <(
            gh pr list --state open --limit 500 \
              --json number,headRefName,createdAt \
              --jq '.[] | select(.headRefName | startswith("cursor/")) | "\(.number)\t\(.headRefName)\t\(.createdAt)"'
          )

          closed=0
          for line in "${rows[@]}"; do
            num="${line%%$'\t'*}"
            rest="${line#*$'\t'}"
            ref="${rest%%$'\t'*}"
            created_at="${rest#*$'\t'}"
            is_recent_bridge_duplicate "$ref" "$created_at" || continue
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "Would close #$num ($ref, created $created_at)"
              continue
            fi
            gh pr close "$num" --delete-branch || gh pr close "$num" || true
            closed=$((closed + 1))
            echo "Closed #$num ($ref)"
          done

          echo "Closed $closed duplicate PR(s) from the last ${DAYS} day(s)."
